<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EduConect - Control Residencial</title>
    <style>
        :root { --red: #e63946; --dark: #1a1a1a; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }

        /* Header Pro */
        header { 
            display: flex; align-items: center; justify-content: center;
            background: var(--dark); color: white; padding: 20px; 
            border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }
        .logo-inst { height: 50px; margin-right: 15px; }
        .brand { color: var(--red); font-weight: bold; }

        /* Contenedor Grid Responsivo */
        .container { max-width: 1100px; margin: auto; display: grid; gap: 20px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .container { grid-template-columns: 1fr 1fr; } .info-section { grid-column: span 2; } }

        /* Sección de Imagen y Refrán */
        .info-section { 
            background: var(--white); border-radius: 20px; padding: 30px; text-align: center;
            border-top: 6px solid var(--dark); box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .house-link { display: inline-block; text-decoration: none; transition: transform 0.3s; }
        .house-link:hover { transform: scale(1.05); }
        .home-img { width: 100%; max-width: 300px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        .quote { font-style: italic; color: #555; margin-top: 20px; font-size: 1.1rem; }
        .quote strong { color: var(--red); }

        .ip-box { width: 100%; max-width: 300px; padding: 12px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: center; }

        /* Tarjetas de Control */
        .card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-top: 6px solid var(--red); }
        h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9; }

        /* Switch */
        .switch { position: relative; width: 55px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--red); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

    <header>
        <img src="images/logo.png" alt="Logo" class="logo-inst">
        <h1><span class="brand">EduConect</span> Domótica</h1>
    </header>

    <div class="container">
        <!-- Imagen de la Casa con Refrán -->
        <section class="info-section">
            <a href="#" class="house-link">
                <img src="images/casa.png" alt="Control Casa" class="home-img">
            </a>
            <p class="quote">"La tecnología es mejor cuando <strong>une a la gente</strong> y simplifica tu hogar."</p>
            <p style="font-size: 0.8rem; opacity: 0.7;">Docente: Rubén Condori</p>
            <input type="text" id="ip" class="ip-box" placeholder="Ingresar IP del ESP32">
        </section>

        <!-- Columna 1 -->
        <div class="card">
            <h2>💡 Dormitorios</h2>
            <div class="row"><strong><span>🛌Cuarto 1 (P13)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(0)"><span class="slider"></span></label></div>
            <div class="row"><strong><span>🛌Cuarto 2 (P12)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(1)"><span class="slider"></span></label></div>
            <div class="row"><strong><span>🛌Cuarto 3 (P14)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(2)"><span class="slider"></span></label></div>
            <div class="row"><strong><span>🛌Cuarto 4 (P27)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(3)"><span class="slider"></span></label></div>
        </div>

        <!-- Columna 2 -->
        <div class="card">
            <h2>🛋️ Sala y Confort</h2>
            <div class="row"><strong><span>💡Luz Sala A(26)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(4)"><span class="slider"></span></label></div>
            <div class="row"><strong><span>💡Luz Sala B(25)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(5)"><span class="slider"></span></label></div>
            <div class="row"><strong><span>💡Luz Sala C (33)</span></strong><label class="switch"><input type="checkbox" onchange="ctrl(6)"><span class="slider"></span></label></div>
            <div class="row" style="color:#007bff"><span>🌀 Ventilador (P32)</span><label class="switch"><input type="checkbox" onchange="ctrl(7)"><span class="slider"></span></label></div>
        </div>
    </div>

    <script>
        function ctrl(id) {
            const ip = document.getElementById('ip').value;
            if(!ip) { alert("¡Ingresa la IP primero!"); return; }
            fetch(`http://${ip}/toggle?id=${id}`).catch(err => console.log("Error de conexión"));
        }
    </script>
</body>
</html>
